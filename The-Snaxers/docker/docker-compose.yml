# Docker Compose för lokal utveckling av The Snaxers
# Kör från Snaxers-Solution/The-Snaxers/docker/ med:
# docker compose up -d --build

services:
  web:
    build:
      # Context pekar på The-Snaxers/ där Dockerfile ligger
      context: ..
      dockerfile: Dockerfile
    container_name: the-snaxers
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # CosmosDB och Key Vault konfigureras via User Secrets lokalt
      # I produktion används Azure Container Apps miljövariabler