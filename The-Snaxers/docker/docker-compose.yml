# Docker Compose för lokal utveckling av The Snaxers
# Kör från Snaxers-Solution/ med:
# docker compose -f The-Snaxers/docker/docker-compose.yml up -d --build
#
# OBS: Skapa en .env-fil i samma mapp med känsliga värden — se .env.example

services:
  web:
    build:
      context: ../..
      dockerfile: The-Snaxers/Dockerfile
    container_name: the-snaxers
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AzureStorage__ProductContainerName=products
      - ConnectionStrings__AzureBlobStorage=${BLOB_CONNECTION_STRING}
      - CosmosDb__AccountEndpoint=${COSMOS_ENDPOINT}
      - CosmosDb__TenantId=${COSMOS_TENANT_ID}
      - CosmosDb__DatabaseName=${COSMOS_DATABASE}
      - CosmosDb__ContainerName=${COSMOS_CONTAINER}
      - CosmosDb__AccountKey=${COSMOS_KEY}
    volumes:
      - snaxers_data:/app

# Volym-deklaration för att persistera SQLite (Identity-användare)
volumes:
  snaxers_data: