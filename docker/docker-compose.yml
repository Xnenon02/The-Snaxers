# TODO: Lägg till Azure Key Vault och App Insights miljövariabler i environment-sektionen
version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      # Använder en namngiven volym istället för en hårdkodad filsökväg
      - snaxers_data:/app

volumes:
  snaxers_data: